name: CI - Valida Brasil

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  build-and-test:
    name: build and test
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: JDK Config
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Env Vars Checkout
        run: |
          echo "========== Ambiente de CI =========="
          java -version
          mvn -version
          echo "===================================="

      - name: Compile
        run: mvn -B compile

      - name: Test
        run: mvn -B test

      - name: Publish test summary
        if: always()
        run: |
          TOTAL=0; FAILURES=0; ERRORS=0; SKIPPED=0
          for f in target/surefire-reports/TEST-*.xml; do
            TOTAL=$((TOTAL     + $(grep -oP 'tests="\K[0-9]+'     "$f" | head -1)))
            FAILURES=$((FAILURES + $(grep -oP 'failures="\K[0-9]+' "$f" | head -1)))
            ERRORS=$((ERRORS   + $(grep -oP 'errors="\K[0-9]+'    "$f" | head -1)))
            SKIPPED=$((SKIPPED + $(grep -oP 'skipped="\K[0-9]+'   "$f" | head -1)))
          done
          PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))
          echo "## Test Results Summary"        >> $GITHUB_STEP_SUMMARY
          echo "| Metric    | Count |"           >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|"           >> $GITHUB_STEP_SUMMARY
          echo "| Passed    | $PASSED   |"       >> $GITHUB_STEP_SUMMARY
          echo "| Failures  | $FAILURES |"       >> $GITHUB_STEP_SUMMARY
          echo "| Errors    | $ERRORS   |"       >> $GITHUB_STEP_SUMMARY
          echo "| Skipped   | $SKIPPED  |"       >> $GITHUB_STEP_SUMMARY
          echo "| Total     | $TOTAL    |"       >> $GITHUB_STEP_SUMMARY